name: colbert_mxbai_phase17g_otf_131K_saelens_2B
description: >
  Phase 17g — 17f retrained at 2B tokens (matching 17b/d budget).
  17f at 1B had widest decoder norm spread of any run (0.02-18, vs
  17b's 0.05-6.7) AND dropped 14k live features when fold_W_dec_norm
  was applied post-hoc (vs 47 for 17b). Both symptoms of undertraining
  at 131K. Retrieval also regressed to 0.706 (17b champ = 0.723).

  Hypothesis: 2B tokens will narrow the norm spread, reduce the
  "parasitic" low-norm feature count, and close or exceed 17b on
  retrieval while staying above 17f's validated count of 5,986.
  If confirmed → scaling story holds. If retrieval still regresses
  at 2B → something else is capping 131K.

data:
  parquet_dirs:
    - /data/chunks/fineweb-edu-sample-10BT-chunked-500/train
    - /data/chunks/RedPajama-Data-V2-sample-10B-chunked-500/train
    - /data/chunks/pile-uncopyrighted-chunked-500/train
  d_in: 64
  model_id: mixedbread-ai/mxbai-edge-colbert-v0-32m
  chunks_per_encode: 64
  queue_size: 4
  seed: 42
  n_samples: 2000000000
  shuffle_buffer_size: 4000000
  on_device: true

sae:
  sae_type: matryoshka
  expansion_factor: 2048
  k: 32
  k_anneal: false
  matryoshka_sizes: "512,2048,8192,16384,32768,65536,131072"
  matryoshka_ks: "8,16,32,32,32,32,32"
  decoder_init_norm: 0.1
  normalize_decoder: true

train:
  batch_size: 8192
  lr_warmup_steps: 5000
  use_amp: true
  save_every: 100000
  auxk_alpha: 0.0
  use_b_dec_init: false
  use_decoder_norm: false
  use_grad_clip: true
  use_remove_parallel_grad: false

logging:
  results_dir: experiments/results
