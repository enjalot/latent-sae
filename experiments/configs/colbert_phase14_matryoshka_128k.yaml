name: colbert_mxbai_phase14_matryoshka_128k
description: >
  Phase 14 Thread 3 — Matryoshka at 131,072 latents (128K), 7-level nesting.
  Tests whether the MEGA→ULTRA→HYPER trend continues past 64K latents.

data:
  datasets:
    - /data/embeddings/fineweb-edu-sample-10BT-chunked-500-mxbai-edge-32m/train
  d_in: 64
  file_type: npy
  raw_dtype: float16
  shuffle: true
  n_samples: 200000000

sae:
  sae_type: matryoshka
  expansion_factor: 2048      # 64 * 2048 = 131072 latents
  k: 32
  k_anneal: false
  matryoshka_sizes: "512,2048,8192,16384,32768,65536,131072"
  matryoshka_ks: "8,16,24,32,32,32,32"

train:
  batch_size: 4096            # halved because pre_acts at 128K × 4096 × 4B ≈ 2 GB per level × 7 levels
  grad_acc_steps: 2            # effective batch = 8192 (same as HYPER)
  lr_warmup_steps: 2000
  use_amp: true
  save_every: 20000
  auxk_alpha: 0.0
  dead_feature_threshold: 50000
  num_workers: 2
  shuffle: true

logging:
  use_wandb: true
  wandb_project: latent-sae
  wandb_run_name: colbert_mxbai_phase14_matryoshka_128k
  wandb_tags: [colbert, mxbai-32m, phase14, matryoshka, scale]
  wandb_group: colbert_phase14
  results_dir: experiments/results
  save_model: true
