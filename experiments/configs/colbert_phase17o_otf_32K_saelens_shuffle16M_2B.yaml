name: colbert_mxbai_phase17o_otf_32K_saelens_shuffle16M_2B
description: >
  Phase 17o — shuffle-breadth ablation. Same as 17b in every way
  except shuffle_buffer_size goes from 4M to 16M tokens. Tests whether
  the disk-backed-vs-OTF quality gap is driven by shuffle breadth:
  disk-backed effectively shuffles across the entire 1.1B-token
  pre-embedded pool, while OTF shuffles within a 4M sliding window.

  16M tokens × 128 bytes (fp16, 64 dim) = ~2 GB on-GPU buffer; fits
  alongside the matryoshka SAE and ColBERT producer on the 32 GB
  RTX 5090. Quadruples the effective mixing range.

  Decision (with 17n): if 17o lifts rigor toward disk-backed levels
  while 17n does not, shuffle breadth was the dominant difference. If
  17n lifts but 17o does not, recipe + replay compounding was the
  right axis. If neither lifts, the remaining gap is elsewhere
  (ColBERT input normalization, measurement methodology, etc.).

data:
  parquet_dirs:
    - /data/chunks/fineweb-edu-sample-10BT-chunked-500/train
    - /data/chunks/RedPajama-Data-V2-sample-10B-chunked-500/train
    - /data/chunks/pile-uncopyrighted-chunked-500/train
  d_in: 64
  model_id: mixedbread-ai/mxbai-edge-colbert-v0-32m
  chunks_per_encode: 64
  queue_size: 4
  seed: 42
  n_samples: 2000000000
  shuffle_buffer_size: 16000000
  on_device: true

sae:
  sae_type: matryoshka
  expansion_factor: 512
  k: 32
  k_anneal: false
  matryoshka_sizes: "512,2048,8192,16384,32768"
  matryoshka_ks: "8,16,32,32,32"
  decoder_init_norm: 0.1
  normalize_decoder: true

train:
  batch_size: 8192
  lr_warmup_steps: 5000
  use_amp: true
  save_every: 100000
  auxk_alpha: 0.0
  use_b_dec_init: false
  use_decoder_norm: false
  use_grad_clip: true
  use_remove_parallel_grad: false

logging:
  results_dir: experiments/results
