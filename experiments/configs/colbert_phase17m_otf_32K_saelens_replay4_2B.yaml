name: colbert_mxbai_phase17m_otf_32K_saelens_replay4_2B
description: >
  Phase 17m — Batch A point 2 of 2. Replay sweep at 32K. Same as 17l
  but replay_factor=4.0 — each encoded token sampled ~4 times on
  average, reducing unique-token count to ~500M while keeping training
  samples at 2B. With 17l (replay 2.0) and 17b (replay 1.0 control),
  this gives a 3-point curve on data-exposure pressure at fixed
  training compute.

  Decision metric (with 17l): rigor COH+THM accuracy lift toward
  disk-backed Phase 14 ~0.82, without dropping nDCG@10 more than
  ~0.01 from 17b's 0.7226.

data:
  parquet_dirs:
    - /data/chunks/fineweb-edu-sample-10BT-chunked-500/train
    - /data/chunks/RedPajama-Data-V2-sample-10B-chunked-500/train
    - /data/chunks/pile-uncopyrighted-chunked-500/train
  d_in: 64
  model_id: mixedbread-ai/mxbai-edge-colbert-v0-32m
  chunks_per_encode: 64
  queue_size: 4
  seed: 42
  n_samples: 2000000000
  shuffle_buffer_size: 4000000
  on_device: true
  replay_factor: 4.0

sae:
  sae_type: matryoshka
  expansion_factor: 512
  k: 32
  k_anneal: false
  matryoshka_sizes: "512,2048,8192,16384,32768"
  matryoshka_ks: "8,16,32,32,32"
  decoder_init_norm: 0.1
  normalize_decoder: true

train:
  batch_size: 8192
  lr_warmup_steps: 5000
  use_amp: true
  save_every: 100000
  auxk_alpha: 0.0
  use_b_dec_init: false
  use_decoder_norm: false
  use_grad_clip: true
  use_remove_parallel_grad: false

logging:
  results_dir: experiments/results
