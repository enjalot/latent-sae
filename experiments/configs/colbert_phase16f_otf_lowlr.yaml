name: colbert_mxbai_phase16f_otf_lowlr_longwarmup
description: >
  Phase 16f (contingent) — Test whether OTF's effective gradient variance
  is too high for default LR schedule. Same as 16d (4M buffer, 800M) but
  with half the LR and 5× longer warmup. If the gap narrows with smaller
  step size, training dynamics (not data) were the issue.

data:
  parquet_dirs:
    - /data/chunks/fineweb-edu-sample-10BT-chunked-500/train
    - /data/chunks/RedPajama-Data-V2-sample-10B-chunked-500/train
    - /data/chunks/pile-uncopyrighted-chunked-500/train
  d_in: 64
  model_id: mixedbread-ai/mxbai-edge-colbert-v0-32m
  chunks_per_encode: 64
  queue_size: 4
  seed: 42
  n_samples: 800000000
  shuffle_buffer_size: 4000000

sae:
  sae_type: matryoshka
  expansion_factor: 128
  k: 32
  k_anneal: false
  matryoshka_sizes: "512,2048,8192"
  matryoshka_ks: "8,16,32"

train:
  batch_size: 8192
  lr: 1.4e-4
  lr_warmup_steps: 10000
  use_amp: true
  save_every: 20000
  auxk_alpha: 0.0

logging:
  results_dir: experiments/results
