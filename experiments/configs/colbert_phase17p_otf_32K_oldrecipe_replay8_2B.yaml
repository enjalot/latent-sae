name: colbert_mxbai_phase17p_otf_32K_oldrecipe_replay8_2B
description: >
  Phase 17p — replay-curve continuation. 17a (replay 1.0): 4,592 live,
  rigor 0.655. 17n (replay 4.0): 10,281 live, rigor 0.644. Both old
  recipe. 17p doubles replay again to 8.0. If the curve continues,
  expect live ~15-20K with rigor still ≥0.6. If saturated, expect
  live near 10K and possibly slight rigor regression.

  Either outcome is informative. Continued growth → run 17q at 64K
  with replay 8.0. Saturation → run 17q at 64K with replay 4.0
  (confirmed sweet spot).

data:
  parquet_dirs:
    - /data/chunks/fineweb-edu-sample-10BT-chunked-500/train
    - /data/chunks/RedPajama-Data-V2-sample-10B-chunked-500/train
    - /data/chunks/pile-uncopyrighted-chunked-500/train
  d_in: 64
  model_id: mixedbread-ai/mxbai-edge-colbert-v0-32m
  chunks_per_encode: 64
  queue_size: 4
  seed: 42
  n_samples: 2000000000
  shuffle_buffer_size: 4000000
  on_device: true
  replay_factor: 8.0

sae:
  sae_type: matryoshka
  expansion_factor: 512
  k: 32
  k_anneal: false
  matryoshka_sizes: "512,2048,8192,16384,32768"
  matryoshka_ks: "8,16,32,32,32"

train:
  batch_size: 8192
  lr_warmup_steps: 5000
  use_amp: true
  save_every: 100000
  auxk_alpha: 0.0
  use_grad_clip: true

logging:
  results_dir: experiments/results
