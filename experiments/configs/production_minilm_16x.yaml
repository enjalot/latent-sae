name: prod_minilm_16x_150M
description: >
  Production TopK SAE at 16x expansion (6,144 features).
  Testing if more features close the CLINC150 gap (19.6% at 8x).
  Same data mix as 8x production run.

data:
  datasets:
    - /embeddings/fineweb-edu-sample-10BT-chunked-120-all-MiniLM-L6-v2/train
    - /embeddings/RedPajama-Data-V2-sample-10B-chunked-120-all-MiniLM-L6-v2/train
    - /embeddings/pile-uncopyrighted-chunked-120-all-MiniLM-L6-v2/train
  d_in: 384
  file_type: npy
  n_samples: 150000000

sae:
  sae_type: topk
  expansion_factor: 16
  k: 64

train:
  batch_size: 1024
  grad_acc_steps: 2
  lr_warmup_steps: 5000
  use_amp: true
  save_every: 10000
  auxk_alpha: 0.03125
  dead_feature_threshold: 50000

logging:
  use_wandb: true
  wandb_project: latent-sae
  wandb_run_name: prod_minilm_16x_150M
  wandb_tags:
    - production
    - minilm
    - 16x
  wandb_group: production
  results_dir: experiments/results
  save_model: true

infra:
  gpu_type: a10g
