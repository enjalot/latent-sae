name: lista_sweep
description: >
  LISTA (Learned ISTA) experiments: lateral inhibition via decoder correlations.
  Compares different inhibition strengths (eta) against TopK baseline.
  Uses v2 settings (auxk=1/32, dead_threshold=50K).

data:
  datasets:
    - /embeddings/fineweb-edu-sample-10BT-chunked-120-all-MiniLM-L6-v2/train
    - /embeddings/RedPajama-Data-V2-sample-10B-chunked-120-all-MiniLM-L6-v2/train
    - /embeddings/pile-uncopyrighted-chunked-120-all-MiniLM-L6-v2/train
  d_in: 384
  file_type: npy
  n_samples: 10000000

sae:
  sae_type: lista
  expansion_factor: 32
  k: 64
  lista_eta: 0.1
  lista_steps: 1

train:
  batch_size: 1024
  grad_acc_steps: 2
  lr_warmup_steps: 1000
  use_amp: true
  save_every: 5000
  auxk_alpha: 0.03125
  dead_feature_threshold: 50000

logging:
  use_wandb: true
  wandb_project: latent-sae-arch-sweep
  wandb_tags:
    - lista
    - arch_sweep_v2
  wandb_group: lista_10M
  results_dir: experiments/results
  save_model: false

infra:
  gpu_type: a10g
