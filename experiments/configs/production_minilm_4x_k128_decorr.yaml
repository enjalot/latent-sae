name: prod_minilm_4x_k128_decorr_150M
description: >
  Production run with cosine decorrelation loss (autoresearch winner).
  4x expansion, k=128, decorr_alpha=0.01.

data:
  datasets:
    - /embeddings/fineweb-edu-sample-10BT-chunked-120-all-MiniLM-L6-v2/train
    - /embeddings/RedPajama-Data-V2-sample-10B-chunked-120-all-MiniLM-L6-v2/train
    - /embeddings/pile-uncopyrighted-chunked-120-all-MiniLM-L6-v2/train
  d_in: 384
  file_type: npy
  n_samples: 150000000

sae:
  sae_type: topk
  expansion_factor: 4
  k: 128
  decorr_alpha: 0.01

train:
  batch_size: 1024
  grad_acc_steps: 2
  lr_warmup_steps: 5000
  use_amp: true
  save_every: 10000
  auxk_alpha: 0.03125
  dead_feature_threshold: 50000

logging:
  use_wandb: true
  wandb_project: latent-sae
  wandb_run_name: prod_minilm_4x_k128_decorr_150M
  wandb_tags:
    - production
    - minilm
    - decorr
  wandb_group: production
  results_dir: experiments/results
  save_model: true

infra:
  gpu_type: a10g
