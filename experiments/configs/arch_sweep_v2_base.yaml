name: arch_sweep_v2
description: >
  Architecture sweep with proper dead feature handling.
  Key changes from v1: auxk_alpha=1/32, dead_feature_threshold=50000,
  multi_topk_fvu scaled by 1/8 (handled in code).
  10M samples pilot on MiniLM 3-source mix.

data:
  datasets:
    - /embeddings/fineweb-edu-sample-10BT-chunked-120-all-MiniLM-L6-v2/train
    - /embeddings/RedPajama-Data-V2-sample-10B-chunked-120-all-MiniLM-L6-v2/train
    - /embeddings/pile-uncopyrighted-chunked-120-all-MiniLM-L6-v2/train
  d_in: 384
  file_type: npy
  n_samples: 10000000

sae:
  sae_type: topk
  expansion_factor: 32
  k: 64

train:
  batch_size: 1024
  grad_acc_steps: 2
  lr_warmup_steps: 1000
  use_amp: true
  save_every: 5000
  auxk_alpha: 0.03125
  dead_feature_threshold: 50000

logging:
  use_wandb: true
  wandb_project: latent-sae-arch-sweep
  wandb_tags:
    - arch_sweep_v2
    - auxk_fixed
  wandb_group: arch_sweep_v2_10M
  results_dir: experiments/results
  save_model: false

infra:
  gpu_type: a10g
