name: colbert_mxbai_phase17e_otf_32K_saelens_batchtopk_2B
description: >
  Phase 17e — combine today's three winners: 32K matryoshka + SAELens
  recipe + BatchTopK per-level selection + 2B OTF tokens + on-device
  pipeline. Tests whether BatchTopK's per-sample budget flexibility
  compounds with the SAELens recipe, now that 17b has confirmed the
  recipe at this architecture and 17c ruled out BatchTopK-alone at 8K.

data:
  parquet_dirs:
    - /data/chunks/fineweb-edu-sample-10BT-chunked-500/train
    - /data/chunks/RedPajama-Data-V2-sample-10B-chunked-500/train
    - /data/chunks/pile-uncopyrighted-chunked-500/train
  d_in: 64
  model_id: mixedbread-ai/mxbai-edge-colbert-v0-32m
  chunks_per_encode: 64
  queue_size: 4
  seed: 42
  n_samples: 2000000000
  shuffle_buffer_size: 4000000
  on_device: true

sae:
  sae_type: matryoshka
  expansion_factor: 512
  k: 32
  k_anneal: false
  matryoshka_sizes: "512,2048,8192,16384,32768"
  matryoshka_ks: "8,16,32,32,32"
  matryoshka_use_batchtopk: true
  decoder_init_norm: 0.1
  normalize_decoder: true

train:
  batch_size: 8192
  lr_warmup_steps: 5000
  use_amp: true
  save_every: 100000
  auxk_alpha: 0.0
  use_b_dec_init: false
  use_decoder_norm: false
  use_grad_clip: true
  use_remove_parallel_grad: false

logging:
  results_dir: experiments/results
