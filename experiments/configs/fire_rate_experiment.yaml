name: fire_rate_exp
description: >
  Fire rate penalty experiment. 4 runs: MiniLM/nomic x with/without
  max_fire_rate=0.5 penalty. All on Wikipedia 20M, 4x k=128.

data:
  datasets:
    - PLACEHOLDER
  d_in: 384
  file_type: npy
  n_samples: 20000000

sae:
  sae_type: topk
  expansion_factor: 4
  k: 128
  max_fire_rate: 0.0
  fire_rate_penalty: 1.0

train:
  batch_size: 1024
  grad_acc_steps: 2
  lr_warmup_steps: 2000
  use_amp: true
  save_every: 50000
  auxk_alpha: 0.03125
  dead_feature_threshold: 50000

logging:
  use_wandb: true
  wandb_project: latent-sae
  wandb_tags:
    - fire_rate_exp
  wandb_group: fire_rate_exp
  results_dir: experiments/results
  save_model: true

infra:
  gpu_type: a10g
