name: colbert_mxbai_phase17b_otf_32K_saelens_2B
description: >
  Phase 17b — same 32K-max matryoshka as 17a, 2B OTF tokens, but with
  the SAELens Apr-2024 recipe. Differences from 17a:
    - decoder rows initialized to norm 0.1 (not unit norm)
    - b_dec initialized to zero (no geometric median)
    - no per-step set_decoder_norm_to_unit_norm
    - no remove_gradient_parallel_to_decoder_directions
  Keeps grad_clip=1.0 and Adam. Direct A/B against 17a to see whether
  the "newer" SAELens training recipe matches or improves on the
  older per-step-renormalize recipe for matryoshka SAEs at this
  architecture.

data:
  parquet_dirs:
    - /data/chunks/fineweb-edu-sample-10BT-chunked-500/train
    - /data/chunks/RedPajama-Data-V2-sample-10B-chunked-500/train
    - /data/chunks/pile-uncopyrighted-chunked-500/train
  d_in: 64
  model_id: mixedbread-ai/mxbai-edge-colbert-v0-32m
  chunks_per_encode: 64
  queue_size: 4
  seed: 42
  n_samples: 2000000000
  shuffle_buffer_size: 4000000

sae:
  sae_type: matryoshka
  expansion_factor: 512
  k: 32
  k_anneal: false
  matryoshka_sizes: "512,2048,8192,16384,32768"
  matryoshka_ks: "8,16,32,32,32"
  decoder_init_norm: 0.1
  normalize_decoder: true

train:
  batch_size: 8192
  lr_warmup_steps: 5000
  use_amp: true
  save_every: 100000
  auxk_alpha: 0.0
  use_b_dec_init: false
  use_decoder_norm: false
  use_grad_clip: true
  use_remove_parallel_grad: false

logging:
  results_dir: experiments/results
