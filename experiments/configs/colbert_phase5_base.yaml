name: colbert_mxbai_phase5
description: >
  Phase 5 — fine k sweep at the Phase 4 winning expansion (exp=2, 128 latents,
  TopK). Find the cleanest k for a production candidate.

data:
  datasets:
    - /data/embeddings/fineweb-edu-sample-10BT-chunked-500-mxbai-edge-32m/train
  d_in: 64
  file_type: npy
  raw_dtype: float16
  shuffle: true
  n_samples: 100000000

sae:
  sae_type: topk
  expansion_factor: 2
  k: 16
  k_anneal: true

train:
  batch_size: 8192
  grad_acc_steps: 1
  lr_warmup_steps: 2000
  use_amp: true
  save_every: 5000
  auxk_alpha: 0.03125
  dead_feature_threshold: 50000
  num_workers: 2

logging:
  use_wandb: true
  wandb_project: latent-sae
  wandb_run_name: colbert_mxbai_phase5
  wandb_tags:
    - colbert
    - mxbai-32m
    - phase5
  wandb_group: colbert_phase5
  results_dir: experiments/results
  save_model: true
