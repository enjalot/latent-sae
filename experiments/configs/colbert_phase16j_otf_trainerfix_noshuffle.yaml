name: colbert_mxbai_phase16j_otf_allfixes_noshuffle
description: >
  Phase 16j — OTF with all trainer fixes but NO consumer shuffle
  buffer. Isolates the effect of the trainer-loop fixes (geometric
  median init + decoder norm + LR/Adam) from the shuffle-buffer fix.
  If 16j ≈ 16i, the shuffle buffer adds nothing once the trainer is
  correct; if 16j < 16i, the buffer still matters.

data:
  parquet_dirs:
    - /data/chunks/fineweb-edu-sample-10BT-chunked-500/train
    - /data/chunks/RedPajama-Data-V2-sample-10B-chunked-500/train
    - /data/chunks/pile-uncopyrighted-chunked-500/train
  d_in: 64
  model_id: mixedbread-ai/mxbai-edge-colbert-v0-32m
  chunks_per_encode: 64
  queue_size: 4
  seed: 42
  n_samples: 800000000
  # No shuffle_buffer_size — falls back to FIFO consumer

sae:
  sae_type: matryoshka
  expansion_factor: 128
  k: 32
  k_anneal: false
  matryoshka_sizes: "512,2048,8192"
  matryoshka_ks: "8,16,32"

train:
  batch_size: 8192
  lr_warmup_steps: 2000
  use_amp: true
  save_every: 20000
  auxk_alpha: 0.0

logging:
  results_dir: experiments/results
