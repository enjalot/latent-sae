name: colbert_mxbai_phase16c_otf_big_800M_mixed
description: >
  Phase 16c — Re-run of Phase 16a (800M even recipe) with the OTF producer
  now picking a fresh domain per encode-batch instead of per parquet. Tests
  whether Phase 16's weak feature quality was caused by the ~15000-batch
  single-domain streaks that the old producer created. Expected: live count
  and COH+THM move materially toward the disk-backed Phase 14 baseline if
  mixing was the dominant factor.

data:
  parquet_dirs:
    - /data/chunks/fineweb-edu-sample-10BT-chunked-500/train
    - /data/chunks/RedPajama-Data-V2-sample-10B-chunked-500/train
    - /data/chunks/pile-uncopyrighted-chunked-500/train
  d_in: 64
  model_id: mixedbread-ai/mxbai-edge-colbert-v0-32m
  chunks_per_encode: 64
  queue_size: 4
  seed: 42
  n_samples: 800000000

sae:
  sae_type: matryoshka
  expansion_factor: 128
  k: 32
  k_anneal: false
  matryoshka_sizes: "512,2048,8192"
  matryoshka_ks: "8,16,32"

train:
  batch_size: 8192
  lr_warmup_steps: 2000
  use_amp: true
  save_every: 20000
  auxk_alpha: 0.0

logging:
  results_dir: experiments/results
