name: colbert_mxbai_phase9
description: >
  Phase 9 — scale sweep for thousands of interpretable features.
  Base config; sae_type and expansion_factor swept separately via sweep yaml.
  k=32 is the anchor sparsity (Phase 5 optimum for retrieval).

data:
  datasets:
    - /data/embeddings/fineweb-edu-sample-10BT-chunked-500-mxbai-edge-32m/train
  d_in: 64
  file_type: npy
  raw_dtype: float16
  shuffle: true
  n_samples: 100000000

sae:
  sae_type: topk
  expansion_factor: 16
  k: 32
  k_anneal: true

train:
  batch_size: 8192
  grad_acc_steps: 1
  lr_warmup_steps: 2000
  use_amp: true
  save_every: 5000
  auxk_alpha: 0.03125
  dead_feature_threshold: 50000
  num_workers: 2

logging:
  use_wandb: true
  wandb_project: latent-sae
  wandb_run_name: colbert_mxbai_phase9
  wandb_tags: [colbert, mxbai-32m, phase9, scale]
  wandb_group: colbert_phase9
  results_dir: experiments/results
  save_model: true
