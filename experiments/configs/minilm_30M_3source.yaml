name: minilm_4x_k128_30M_3source
description: >
  30M MiniLM mix (10M each from FineWeb, RedPajama, Pile @ 120 tokens).
  Tests whether 30M achieves similar quality to 150M.

data:
  datasets:
    - /embeddings/fineweb-edu-sample-10BT-chunked-120-all-MiniLM-L6-v2/train
    - /embeddings/RedPajama-Data-V2-sample-10B-chunked-120-all-MiniLM-L6-v2/train
    - /embeddings/pile-uncopyrighted-chunked-120-all-MiniLM-L6-v2/train
  d_in: 384
  file_type: npy
  n_samples: 30000000

sae:
  sae_type: topk
  expansion_factor: 4
  k: 128

train:
  batch_size: 1024
  grad_acc_steps: 2
  lr_warmup_steps: 2000
  use_amp: true
  save_every: 10000
  auxk_alpha: 0.03125
  dead_feature_threshold: 50000

logging:
  use_wandb: true
  wandb_project: latent-sae
  wandb_run_name: minilm_4x_k128_30M_3source
  wandb_tags:
    - production
    - minilm
    - data_scaling
  wandb_group: data_scaling
  results_dir: experiments/results
  save_model: true

infra:
  gpu_type: a10g
