name: colbert_mxbai_phase17k_otf_32K_saelens_k64_2B
description: >
  Phase 17k — k-sweep at 32K, point 3 of 3 (with 17b as k=32 baseline,
  17j as k=16). Loosens per-sample sparsity to 64 across the largest
  three matryoshka levels. Hypothesis: more features per token gives
  smoother retrieval reconstruction (more degrees of freedom for
  MaxSim) at the cost of feature specificity (each feature has to
  cover less of the input). Inflates live count toward the dictionary
  ceiling.

data:
  parquet_dirs:
    - /data/chunks/fineweb-edu-sample-10BT-chunked-500/train
    - /data/chunks/RedPajama-Data-V2-sample-10B-chunked-500/train
    - /data/chunks/pile-uncopyrighted-chunked-500/train
  d_in: 64
  model_id: mixedbread-ai/mxbai-edge-colbert-v0-32m
  chunks_per_encode: 64
  queue_size: 4
  seed: 42
  n_samples: 2000000000
  shuffle_buffer_size: 4000000
  on_device: true

sae:
  sae_type: matryoshka
  expansion_factor: 512
  k: 64
  k_anneal: false
  matryoshka_sizes: "512,2048,8192,16384,32768"
  matryoshka_ks: "16,32,64,64,64"
  decoder_init_norm: 0.1
  normalize_decoder: true

train:
  batch_size: 8192
  lr_warmup_steps: 5000
  use_amp: true
  save_every: 100000
  auxk_alpha: 0.0
  use_b_dec_init: false
  use_decoder_norm: false
  use_grad_clip: true
  use_remove_parallel_grad: false

logging:
  results_dir: experiments/results
