name: colbert_mxbai_phase17d_otf_32K_batchtopk_2B
description: >
  Phase 17d — 32K BatchTopK matryoshka, 2B tokens. Combines the
  largest architecture we're running today with BatchTopK per-level
  selection. Recipe will be set before launch based on the Run 1
  vs Run 2 comparison: if 17b (SAELens recipe) beats 17a, this run
  uses SAELens recipe; otherwise our standard recipe. Default below
  is our standard recipe (override via train: use_* flags and sae:
  decoder_init_norm at launch time if needed).

data:
  parquet_dirs:
    - /data/chunks/fineweb-edu-sample-10BT-chunked-500/train
    - /data/chunks/RedPajama-Data-V2-sample-10B-chunked-500/train
    - /data/chunks/pile-uncopyrighted-chunked-500/train
  d_in: 64
  model_id: mixedbread-ai/mxbai-edge-colbert-v0-32m
  chunks_per_encode: 64
  queue_size: 4
  seed: 42
  n_samples: 2000000000
  shuffle_buffer_size: 4000000

sae:
  sae_type: matryoshka
  expansion_factor: 512
  k: 32
  k_anneal: false
  matryoshka_sizes: "512,2048,8192,16384,32768"
  matryoshka_ks: "8,16,32,32,32"
  matryoshka_use_batchtopk: true

train:
  batch_size: 8192
  lr_warmup_steps: 5000
  use_amp: true
  save_every: 100000
  auxk_alpha: 0.0

logging:
  results_dir: experiments/results
