name: colbert_mxbai_phase16g_otf_bigbuffer_16M
description: >
  Phase 16g (contingent) — Push shuffle buffer from 4M → 16M tokens
  (~2GB RAM) to see if per-batch chunk diversity is still the bottleneck.
  At 16M the buffer holds ~42K chunks; a batch of 8192 samples should
  draw from ~7K distinct chunks — matching disk-backed's 8K diversity.

data:
  parquet_dirs:
    - /data/chunks/fineweb-edu-sample-10BT-chunked-500/train
    - /data/chunks/RedPajama-Data-V2-sample-10B-chunked-500/train
    - /data/chunks/pile-uncopyrighted-chunked-500/train
  d_in: 64
  model_id: mixedbread-ai/mxbai-edge-colbert-v0-32m
  chunks_per_encode: 64
  queue_size: 4
  seed: 42
  n_samples: 800000000
  shuffle_buffer_size: 16000000

sae:
  sae_type: matryoshka
  expansion_factor: 128
  k: 32
  k_anneal: false
  matryoshka_sizes: "512,2048,8192"
  matryoshka_ks: "8,16,32"

train:
  batch_size: 8192
  lr_warmup_steps: 2000
  use_amp: true
  save_every: 20000
  auxk_alpha: 0.0

logging:
  results_dir: experiments/results
