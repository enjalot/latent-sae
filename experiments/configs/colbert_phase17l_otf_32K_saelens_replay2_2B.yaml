name: colbert_mxbai_phase17l_otf_32K_saelens_replay2_2B
description: >
  Phase 17l — Batch A point 1 of 2. Replay sweep at 32K to test the
  leading hypothesis on the OTF-vs-disk-backed quality gap. Holds
  EVERY other knob equal to 17b (32K SAELens recipe baseline,
  replay_factor=1.0 control). Only changed: replay_factor=2.0 — each
  encoded token is sampled twice on average over the run, halving the
  unique-token count from 2B to ~1B while keeping training samples at
  2B.

  Decision metric: rigor COH+THM accuracy lifting from ~0.55 toward
  the disk-backed Phase 14 reference of ~0.82.

data:
  parquet_dirs:
    - /data/chunks/fineweb-edu-sample-10BT-chunked-500/train
    - /data/chunks/RedPajama-Data-V2-sample-10B-chunked-500/train
    - /data/chunks/pile-uncopyrighted-chunked-500/train
  d_in: 64
  model_id: mixedbread-ai/mxbai-edge-colbert-v0-32m
  chunks_per_encode: 64
  queue_size: 4
  seed: 42
  n_samples: 2000000000
  shuffle_buffer_size: 4000000
  on_device: true
  replay_factor: 2.0

sae:
  sae_type: matryoshka
  expansion_factor: 512
  k: 32
  k_anneal: false
  matryoshka_sizes: "512,2048,8192,16384,32768"
  matryoshka_ks: "8,16,32,32,32"
  decoder_init_norm: 0.1
  normalize_decoder: true

train:
  batch_size: 8192
  lr_warmup_steps: 5000
  use_amp: true
  save_every: 100000
  auxk_alpha: 0.0
  use_b_dec_init: false
  use_decoder_norm: false
  use_grad_clip: true
  use_remove_parallel_grad: false

logging:
  results_dir: experiments/results
