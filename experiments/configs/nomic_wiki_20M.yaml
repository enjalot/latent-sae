name: nomic_wiki_20M
description: "Nomic Wikipedia-only baseline, 4x k=128"

data:
  datasets:
    - /embeddings/wikipedia-en-chunked-120-nomic-embed-text-v1.5/train
  d_in: 768
  file_type: npy
  n_samples: 20000000

sae:
  sae_type: topk
  expansion_factor: 4
  k: 128

train:
  batch_size: 1024
  grad_acc_steps: 2
  lr_warmup_steps: 2000
  use_amp: true
  save_every: 50000
  auxk_alpha: 0.03125
  dead_feature_threshold: 50000

logging:
  use_wandb: true
  wandb_project: latent-sae
  wandb_tags: [fire_rate_exp, nomic, wiki]
  wandb_group: fire_rate_exp
  results_dir: experiments/results
  save_model: true

infra:
  gpu_type: a10g
