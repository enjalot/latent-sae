name: colbert_mxbai_phase17s_otf_131K_oldrecipe_replay4_4B
description: >
  Phase 17s (Case A) — token scaling at the new champion arch.
  Auto-launched only if 17r showed COH rigor >= 0.83 (clear lift over
  17q's 0.815). Doubles training tokens to 4B at 131K with old recipe
  + replay 4. Tests whether the 13K live-feature ceiling we've seen
  across every 2B-token run is data-bound or capacity-bound.

  Reference: 17r at 131K + 2B tokens. Prediction: live count breaks
  past 13K → we've found a new scaling lever (data). Live stays at
  13K but rigor lifts → quality is data-bound, count is not.

  ~12h wall time at 131K throughput (~90K samples/s).

data:
  parquet_dirs:
    - /data/chunks/fineweb-edu-sample-10BT-chunked-500/train
    - /data/chunks/RedPajama-Data-V2-sample-10B-chunked-500/train
    - /data/chunks/pile-uncopyrighted-chunked-500/train
  d_in: 64
  model_id: mixedbread-ai/mxbai-edge-colbert-v0-32m
  chunks_per_encode: 64
  queue_size: 4
  seed: 42
  n_samples: 4000000000
  shuffle_buffer_size: 4000000
  on_device: true
  replay_factor: 4.0

sae:
  sae_type: matryoshka
  expansion_factor: 2048
  k: 32
  k_anneal: false
  matryoshka_sizes: "512,2048,8192,16384,32768,65536,131072"
  matryoshka_ks: "8,16,32,32,32,32,32"

train:
  batch_size: 8192
  lr_warmup_steps: 5000
  use_amp: true
  save_every: 100000
  auxk_alpha: 0.0
  use_grad_clip: true

logging:
  results_dir: experiments/results
