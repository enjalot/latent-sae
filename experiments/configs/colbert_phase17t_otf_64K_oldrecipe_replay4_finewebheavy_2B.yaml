name: colbert_mxbai_phase17t_otf_64K_oldrecipe_replay4_finewebheavy_2B
description: >
  Phase 17t (Case B follow-up) — domain-mix sweep on the production
  recipe. Same architecture, recipe, replay, and token budget as 17q
  (the per-feature interpretability champion); only changes domain
  weights from even [1,1,1] to fineweb-heavy [2,1,1] (50/25/25
  fineweb / RedPajama / pile).

  Hypothesis (from feedback Batch C): cleaner-domain training shifts
  the rigor/retrieval tradeoff. Expectation: COH+THM rate up, rigor
  up, scifact retrieval up (scifact is scientific abstracts, closer
  to fineweb-edu than to pile or RedPajama), TREC-COVID
  retrieval mostly stable.

  Reference: 17q (even mix) hit 13,014 live, rigor COH+THM 0.671,
  COH 0.815. Reference from older domain-tilt experiment: Phase 16b
  (50/25/25) showed 14.1% COH+THM rate vs 11.1% for even mix at 800M.

  Auto-launches only if 17s landed in Case B (64K arch). In Case A
  (131K arch) the GPU stays busy through tomorrow morning anyway so
  no need to queue this.

data:
  parquet_dirs:
    - /data/chunks/fineweb-edu-sample-10BT-chunked-500/train
    - /data/chunks/RedPajama-Data-V2-sample-10B-chunked-500/train
    - /data/chunks/pile-uncopyrighted-chunked-500/train
  domain_weights: [2.0, 1.0, 1.0]
  d_in: 64
  model_id: mixedbread-ai/mxbai-edge-colbert-v0-32m
  chunks_per_encode: 64
  queue_size: 4
  seed: 42
  n_samples: 2000000000
  shuffle_buffer_size: 4000000
  on_device: true
  replay_factor: 4.0

sae:
  sae_type: matryoshka
  expansion_factor: 1024
  k: 32
  k_anneal: false
  matryoshka_sizes: "512,2048,8192,16384,32768,65536"
  matryoshka_ks: "8,16,32,32,32,32"

train:
  batch_size: 8192
  lr_warmup_steps: 5000
  use_amp: true
  save_every: 100000
  auxk_alpha: 0.0
  use_grad_clip: true

logging:
  results_dir: experiments/results
