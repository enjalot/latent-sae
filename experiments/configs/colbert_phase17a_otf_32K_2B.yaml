name: colbert_mxbai_phase17a_otf_32K_2B
description: >
  Phase 17a — architecture scale-up to 32K-max matryoshka. Same recipe
  as 16k (all 8 trainer fixes, 4M shuffle buffer). Expands from 16k's
  3-level matryoshka (512,2048,8192) to a 5-level matryoshka reaching
  32,768 latents. Direct comparison point is Phase 11 ULTRA (32K
  disk-backed 200M tokens) — 10× the tokens at matched architecture.
  Also the architecture-matched scaling bridge toward Phase 13's 65K.

data:
  parquet_dirs:
    - /data/chunks/fineweb-edu-sample-10BT-chunked-500/train
    - /data/chunks/RedPajama-Data-V2-sample-10B-chunked-500/train
    - /data/chunks/pile-uncopyrighted-chunked-500/train
  d_in: 64
  model_id: mixedbread-ai/mxbai-edge-colbert-v0-32m
  chunks_per_encode: 64
  queue_size: 4
  seed: 42
  n_samples: 2000000000
  shuffle_buffer_size: 4000000

sae:
  sae_type: matryoshka
  expansion_factor: 512
  k: 32
  k_anneal: false
  matryoshka_sizes: "512,2048,8192,16384,32768"
  matryoshka_ks: "8,16,32,32,32"

train:
  batch_size: 8192
  lr_warmup_steps: 5000
  use_amp: true
  save_every: 100000
  auxk_alpha: 0.0

logging:
  results_dir: experiments/results
