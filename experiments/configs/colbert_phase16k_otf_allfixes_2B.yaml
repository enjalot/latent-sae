name: colbert_mxbai_phase16k_otf_allfixes_2B
description: >
  Phase 16k — scale-up of 16h. Same 8K-latent matryoshka, all 8
  trainer fixes, 4M shuffle buffer, n_samples=2,000,000,000 (2.5×
  16h's data). Tests whether more data improves 16h's low per-feature
  rigor accuracy (0.476) by letting features refine toward specificity.

  Expected wall time: 2B / ~370K samples/s = 5,400s ≈ 90 min.

data:
  parquet_dirs:
    - /data/chunks/fineweb-edu-sample-10BT-chunked-500/train
    - /data/chunks/RedPajama-Data-V2-sample-10B-chunked-500/train
    - /data/chunks/pile-uncopyrighted-chunked-500/train
  d_in: 64
  model_id: mixedbread-ai/mxbai-edge-colbert-v0-32m
  chunks_per_encode: 64
  queue_size: 4
  seed: 42
  n_samples: 2000000000
  shuffle_buffer_size: 4000000

sae:
  sae_type: matryoshka
  expansion_factor: 128
  k: 32
  k_anneal: false
  matryoshka_sizes: "512,2048,8192"
  matryoshka_ks: "8,16,32"

train:
  batch_size: 8192
  lr_warmup_steps: 5000
  use_amp: true
  save_every: 100000
  auxk_alpha: 0.0

logging:
  results_dir: experiments/results
