name: colbert_mxbai_phase16h_otf_trainerfix_shuffle4M
description: >
  Phase 16h — OTF with the SaeTrainer-matched training loop fixes:
    - geometric-median init of decoder bias
    - per-step set_decoder_norm_to_unit_norm
    - multi_topk aux loss
    - dead-mask for auxk (no-op at auxk_alpha=0)
  Plus the consumer-side 4M shuffle buffer from 16d. Everything else
  matches Phase 16a/c/d: even 33/33/33, matryoshka big (8K latents),
  800M samples, k=32, lr_warmup=2000.

data:
  parquet_dirs:
    - /data/chunks/fineweb-edu-sample-10BT-chunked-500/train
    - /data/chunks/RedPajama-Data-V2-sample-10B-chunked-500/train
    - /data/chunks/pile-uncopyrighted-chunked-500/train
  d_in: 64
  model_id: mixedbread-ai/mxbai-edge-colbert-v0-32m
  chunks_per_encode: 64
  queue_size: 4
  seed: 42
  n_samples: 800000000
  shuffle_buffer_size: 4000000

sae:
  sae_type: matryoshka
  expansion_factor: 128
  k: 32
  k_anneal: false
  matryoshka_sizes: "512,2048,8192"
  matryoshka_ks: "8,16,32"

train:
  batch_size: 8192
  lr_warmup_steps: 2000
  use_amp: true
  save_every: 20000
  auxk_alpha: 0.0

logging:
  results_dir: experiments/results
